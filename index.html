<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HISC</title>
  <style>
    :root{
      --bg:#f7f8fb; --card:#fff; --text:#182033; --muted:#667085;
      --line:#e6e8ef; --accent:#2563eb; --cit:#fff4d6; --citText:#9a6700;
      --radius:14px; --max:920px;
    }
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg);color:var(--text)}
    button{font:inherit;cursor:pointer;border:0;background:none;color:inherit}
    .app{width:min(var(--max),calc(100% - 24px));margin:0 auto;padding:22px 0 40px}
    .title{margin:0 0 16px;font-size:22px;letter-spacing:-.04em;font-weight:800}
    .mode{display:flex;gap:8px;margin-bottom:18px}
    .mode button{padding:9px 14px;border-radius:999px;border:1px solid var(--line);background:white;color:var(--muted);font-weight:650}
    .mode button.active{background:var(--accent);border-color:var(--accent);color:white}
    .sectionTitle{margin:18px 0 9px;font-size:15px;color:#344054;font-weight:800}
    .pills{display:flex;flex-wrap:wrap;gap:8px}
    .pill{display:flex;align-items:center;gap:9px;min-height:42px;padding:8px 11px;border-radius:999px;background:var(--card);border:1px solid var(--line);box-shadow:0 1px 2px rgba(16,24,40,.04)}
    .pill:hover{border-color:#bcd0ff;background:#fbfdff}
    .num{width:22px;height:22px;display:grid;place-items:center;flex:none;border-radius:999px;background:#f1f3f8;color:#475467;font-size:12px;font-weight:800}
    .abbr{font-size:12px;font-weight:900;color:#2563eb;background:#eff6ff;padding:3px 6px;border-radius:999px}
    .name{font-size:14px;font-weight:750;white-space:nowrap}
    .tag{padding:3px 6px;border-radius:999px;background:var(--cit);color:var(--citText);font-size:11px;font-weight:900}
    .practice{display:none;background:white;border:1px solid var(--line);border-radius:var(--radius);padding:18px;margin-top:16px}
    .practice.active{display:block}
    .practiceTop{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:14px}
    .practiceTop h2{margin:0;font-size:22px;letter-spacing:-.03em}
    .smallBtn{padding:8px 11px;border-radius:10px;background:#f2f4f7;color:#344054;font-weight:700}
    .counter{color:var(--muted);font-size:13px;margin-bottom:8px}
    .question{min-height:120px;display:grid;place-items:center;text-align:center;background:#f8fafc;border:1px solid var(--line);border-radius:12px;padding:18px;margin-bottom:12px}
    .question strong{display:block;font-size:25px;letter-spacing:-.03em}
    .question span{display:block;margin-top:6px;color:var(--muted);font-size:14px}
    .matrixImg{display:block;max-width:100%;max-height:58vh;margin:0 auto;border-radius:10px}
    .matrixAnswers{display:flex;flex-wrap:wrap;gap:8px;justify-content:center}
    .matrixAnswers .answer{min-width:54px;text-align:center;font-weight:900;font-size:18px}

    .digitMenu{
	  display:grid;
	  grid-template-columns:repeat(3,1fr);
	  gap:6px;
	  margin-bottom:8px;
	}

	.digitMenu button{
	  padding:8px 4px;
	  border-radius:10px;
	  background:#fff;
	  border:1px solid var(--line);
	  font-weight:900;
	  font-size:12px;
	  line-height:1.1;
	  color:#475467;
	}

	.digitMenu button.active{
	  background:var(--accent);
	  border-color:var(--accent);
	  color:#fff;
	}

	.digitPanel{
	  text-align:center;
	  padding:2px 0;
	}

	.digitListen{
	  font-size:15px;
	  color:var(--muted);
	  font-weight:700;
	  height:22px;
	  line-height:22px;
	  margin-bottom:8px;
	  visibility:visible;
	}


	.digitInput{
	  font-size:28px;
	  font-weight:900;
	  color:#2563eb;

	  min-height:34px;
	  line-height:34px;

	  margin:6px 0;
	  letter-spacing:.04em;
	}

	.digitAnswer{
	  font-size:16px;
	  font-weight:900;
	  color:#111827;

	  min-height:24px;
	  line-height:24px;

	  margin-top:4px;
	  padding:0 6px;
	}

	.playBtn{
	  padding:8px 12px;
	  border-radius:12px;
	  background:#2563eb;
	  color:white;
	  font-weight:900;

	  margin:1px auto 2px;

	  display:inline-block;
	}

	.keypad{
	  display:grid;
	  grid-template-columns:repeat(3,1fr);
	  gap:5px;
	  max-width:340px;
	  margin:6px auto 0;
	}

	.keypad.locked{
	  pointer-events:none;
	  opacity:.45;
	}

	.keyBtn{
	  padding:9px;

	  border-radius:12px;

	  background:#fff;
	  border:1px solid var(--line);

	  font-size:20px;
	  font-weight:900;
	}

	.keyBtn.ok{
	  background:#2563eb;
	  color:#fff;
	  border-color:#2563eb;
	}

	.keyBtn.del{
	  background:#f2f4f7;
	}


    /* ===== CUBOS ===== */
    .cubeHud{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:8px;
      margin-bottom:8px;
    }

    .cubeTime{
      font-size:22px;
      font-weight:900;
      color:#111827;
      letter-spacing:-0.04em;
    }

    .cubeStats{
      font-size:11px;
      font-weight:800;
      color:#667085;
      text-align:right;
      line-height:1.25;
    }

    .cubePanel{
      width:100%;
      display:grid;
      gap:6px;
      justify-items:center;
    }

    .cubeLabel{
      font-size:11px;
      color:var(--muted);
      font-weight:800;
      margin-bottom:4px;
    }

    .cubeBoards{
      width:100%;
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:8px;
      align-items:start;
    }

    .cubeBox{
      display:grid;
      justify-items:center;
      gap:6px;
    }

    .cubeReference{
	  width:200px;
	  height:200px;
	  object-fit:contain;
	  border:1px solid #d0d5dd;
	  border-radius:6px;
	  background:#fff;
	  display:block;
	}

	.cubeGrid{
	  display:grid;
	  grid-template-columns:repeat(var(--gridSize, 2), var(--cubeSize, 78px));
	  grid-template-rows:repeat(var(--gridSize, 2), var(--cubeSize, 78px));
      border:1.5px solid #374151;
      background:#374151;
      gap:1.5px;
      touch-action:manipulation;
    }

    .cubeGrid.target{
      --cubeSize:78px;
      pointer-events:none;
    }

    .cubeGrid.work{
      --cubeSize:78px;
    }
	
	.cubeGrid.work[style*="--gridSize:3"]{
	  --cubeSize:56px;
	}

    /* Rotación 45º para diseños de Cubos girados */
    .cubeGrid.work.rotated{
      transform:rotate(45deg);
      transform-origin:center;
      margin:34px 0;
    }

    .cubeMini.rotatedMini{
      transform:rotate(45deg);
      transform-origin:center;
    }


    .cubeCell{
      width:var(--cubeSize, 78px);
      height:var(--cubeSize, 78px);
      background:#fff;
      position:relative;
      overflow:hidden;
      border:0;
      display:block;
    }

    .cubeGrid.work .cubeCell{
      cursor:pointer;
    }
	.cubeCell.E{
	  background:#e5e7eb;
	}

    .cubeCell.W{background:#fff}
    .cubeCell.R{background:#f40b0b}

    /* Triángulos rojos. El otro triángulo queda blanco. */
    .cubeCell.TR{
      background:linear-gradient(45deg, #fff 0 49.4%, #f40b0b 50% 100%);
    }

    .cubeCell.BL{
      background:linear-gradient(45deg, #f40b0b 0 49.4%, #fff 50% 100%);
    }

    .cubeCell.TL{
      background:linear-gradient(135deg, #f40b0b 0 49.4%, #fff 50% 100%);
    }

    .cubeCell.BR{
      background:linear-gradient(135deg, #fff 0 49.4%, #f40b0b 50% 100%);
    }

    .cubeTools{
      display:grid;
      grid-template-columns:repeat(6,1fr);
      gap:6px;
      width:min(100%, 440px);
      margin-top:14px;
    }

    .cubeTool{
      display:grid;
      place-items:center;
      min-height:48px;
      border:1px solid var(--line);
      background:#fff;
      border-radius:10px;
      padding:4px;
    }

    .cubeTool.active{
      border-color:#2563eb;
      box-shadow:0 0 0 2px rgba(37,99,235,.16);
    }

    .cubeMini{
      width:30px;
      height:30px;
      border:1px solid #475467;
    }

    .cubeActions{
      display:flex;
      gap:8px;
      justify-content:center;
      flex-wrap:wrap;
      margin-top:12px;
    }

    .cubeStart,
	.cubeCheck,
	.cubeClear{
	  padding:7px 10px;
	  border-radius:10px;
	  font-weight:800;
	  font-size:13px;
	}

    .cubeStart,
    .cubeCheck{
      background:#2563eb;
      color:#fff;
    }

    .cubeClear{
      background:#f2f4f7;
      color:#344054;
    }

    body.cubeFlashOk .question{
      border-color:#86efac;
      background:#f0fdf4;
    }

    body.cubeFlashBad .question{
      border-color:#fca5a5;
      background:#fef2f2;
    }

    @media(max-width:560px){
      .cubeBoards{
        grid-template-columns:1fr;
        gap:8px;
      }

      .cubeGrid.target{
        --cubeSize:58px;
      }

      .cubeGrid.work{
        --cubeSize:82px;
      }

      .cubeGrid.work.rotated{
        margin:30px 0;
      }


      .cubeTools{
        max-width:330px;
        gap:5px;
      }

      .cubeTool{
        min-height:42px;
      }

      .cubeMini{
        width:38px;
        height:38px;
      }
    }

    /* ===== CLAVES ===== */
    .clavesHud{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:8px;
      margin-bottom:8px;
    }
    .clavesTime{
      font-size:28px;
      font-weight:900;
      color:#111827;
      letter-spacing:-0.04em;
    }
    .clavesStats{
      font-size:13px;
      font-weight:800;
      color:#667085;
      text-align:right;
      line-height:1.25;
    }
    .clavesKey{
	  display:grid;
	  grid-template-columns:repeat(9, minmax(36px,1fr));
	  gap:6px;
	  margin:8px 0 14px;
	}

	.clavesKeyItem{
	  display:grid;
	  grid-template-rows:22px 38px;
	  place-items:center;
	  min-height:62px;
	  border:1px solid var(--line);
	  border-radius:6px;
	  background:#fff;
	  overflow:hidden;
	}

	.clavesKeyItem b{
	  display:grid;
	  place-items:center;
	  width:100%;
	  height:22px;
	  font-size:18px;
	  font-weight:900;
	  color:#475467;
	  border-bottom:1px solid var(--line);
	}

	.clavesKeyItem span{
	  display:grid;
	  place-items:center;
	  width:100%;
	  height:38px;
	  font-size:26px;
	  line-height:1;
	  color:#111827;
	  font-family:"Times New Roman", serif;
	}
	
	
    .clavesPanel{
      text-align:center;
      width:100%;
    }
    .clavesPromptLabel{
      font-size:13px;
      color:var(--muted);
      font-weight:800;
      margin-bottom:2px;
    }
    .clavesNumber{
      font-size:76px;
      line-height:.95;
      font-weight:950;
      color:#111827;
      letter-spacing:-0.06em;
      margin:2px 0 4px;
    }
    .clavesStart{
      padding:12px 18px;
      border-radius:14px;
      background:#2563eb;
      color:#fff;
      font-weight:900;
    }
    .symbolPad{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:7px;
      max-width:340px;
      margin:8px auto 0;
    }
    .symbolPad.locked{
      pointer-events:none;
      opacity:.45;
    }
    .symbolBtn{
	  min-height:52px;
	  border:1px solid var(--line);
	  background:#fff;
	  border-radius:14px;
	  font-size:30px;
	  font-weight:900;
	  display:grid;
	  place-items:center;

	  font-family:"Times New Roman", serif;
	}
    .symbolBtn:active{
      transform:scale(.98);
    }
    body.clavesFlashOk .question{
      border-color:#86efac;
      background:#f0fdf4;
    }
    body.clavesFlashBad .question{
      border-color:#fca5a5;
      background:#fef2f2;
    }
    .clavesResult{
      text-align:center;
      padding:8px 0;
    }
    .clavesResult h3{
      margin:0 0 8px;
      font-size:22px;
    }
    .clavesResultGrid{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:8px;
      margin-top:10px;
    }
    .clavesResultBox{
      border:1px solid var(--line);
      border-radius:12px;
      padding:10px;
      background:#fff;
    }
    .clavesResultBox b{
      display:block;
      font-size:24px;
      color:#111827;
    }
    .clavesResultBox span{
      display:block;
      font-size:12px;
      color:var(--muted);
      font-weight:800;
    }
    @media(max-width:560px){
	
	  .clavesKey{
		  grid-template-columns:repeat(9, minmax(30px,1fr));
		  gap:3px;
		}

	  .clavesKeyItem{
		grid-template-rows:20px 34px;
		min-height:54px;
		border-radius:5px;
	  }

	  .clavesKeyItem b{
		height:20px;
		font-size:16px;
	  }

	  .clavesKeyItem span{
		height:34px;
		font-size:24px;
	  }
	}

	.answers{
	  display:grid;
	  grid-template-columns:repeat(2,1fr);
	  gap:8px;
	}

	.answer{
	  padding:13px;
	  border-radius:12px;
	  background:white;
	  border:1px solid var(--line);
	  text-align:left;
	}

	.answer.correct{
	  background:#ecfdf3;
	  border-color:#86efac;
	}

	.answer.wrong{
	  background:#fef2f2;
	  border-color:#fca5a5;
	}

	.validBox{
	  display:none;

	  margin-top:10px;

	  padding:14px;

	  border:1px solid #bfdbfe;
	  background:#eff6ff;

	  border-radius:12px;
	}

	.validBox.active{
	  display:block;
	}

	.validBox h3{
	  margin:0 0 8px;
	  font-size:15px;
	}

	.validBox ul{
	  margin:0;
	  padding-left:20px;
	  color:#344054;
	}

	.validBox li{
	  margin:5px 0;
	}

	.selfCheck{
	  display:none;
	  gap:8px;
	  margin-top:10px;
	}

	.selfCheck.active{
	  display:flex;
	}

	.okBtn{
	  padding:9px 13px;
	  border-radius:10px;
	  background:#16a34a;
	  color:white;
	  font-weight:750;
	}

	.badBtn{
	  padding:9px 13px;
	  border-radius:10px;
	  background:#dc2626;
	  color:white;
	  font-weight:750;
	}

	
	.feedback{
	  height:32px;
	  min-height:32px;
	  max-height:32px;

	  display:inline-flex;
	  align-items:center;
	  justify-content:center;

	  margin:0;

	  font-size:22px;
	  font-weight:900;

	  text-align:center;
	  letter-spacing:-0.03em;

	  overflow:hidden;
	}

	.feedback.ok{
	  color:#16a34a;
	}

	.feedback.bad{
	  color:#dc2626;
	}

	.timer{
	  display:flex;
	  justify-content:center;
	  align-items:center;

	  margin:10px 0 14px;

	  font-size:34px;
	  font-weight:900;

	  color:#111827;

	  letter-spacing:-0.04em;
	}

	.timer.warn{
	  color:#dc2626;
	}

	.bottom{
	  display:flex;
	  gap:8px;
	  justify-content:flex-end;

	  margin-top:10px;
	}
	.feedbackWrap{
	  display:flex;
	  align-items:center;
	  justify-content:center;
	  gap:10px;
	  min-height:34px;
	}

	.primary{
	  padding:9px 13px;
	  border-radius:10px;
	  background:var(--accent);
	  color:white;
	  font-weight:750;
	}

	.hidden{
	  display:none!important;
	}

	body.practiceMode .title,
	body.practiceMode .mode,
	body.practiceMode #list,
	body.practiceMode .note{
	  display:none;
	}

	body.practiceMode .app{
	  padding-top:14px;
	}

	body.practiceMode .practice{
	  margin-top:0;
	}

	.note{
	  margin-top:18px;
	  color:var(--muted);
	  font-size:12px;
	  line-height:1.4;
	}

	.question{
	  min-height:280px;
	}

	@media(max-width:560px){

	  .app{
		padding-top:16px;
	  }

	  .title{
		font-size:25px;
	  }

	  .mode{
		position:sticky;
		top:0;
		background:var(--bg);
		padding:8px 0;
		z-index:2;
	  }

	  .mode button{
		flex:1;
	  }

	  .pill{
		width:100%;
		justify-content:flex-start;
		border-radius:14px;
	  }

	  .answers{
		grid-template-columns:1fr;
	  }
	}
  </style>

</head>
<body>
  <main class="app">
    <h1 class="title">HISC</h1>

    <nav class="mode">
      <button id="btnCit" class="active">Esenciales CIT</button>
      <button id="btnAll">Todas</button>
    </nav>

    <section id="list"></section>

    <section id="practice" class="practice">
      <div class="practiceTop">
        <h2 id="practiceTitle">Prueba</h2>
        <button class="smallBtn" id="btnClose">Cerrar</button>
      </div>

      <div id="digitMenu" class="digitMenu hidden"></div>
      <div id="counter" class="counter">Pregunta 1/2</div>

      <div id="timer" class="timer">20</div>

      <div class="question">
        <div>
          <strong id="qText">Pregunta</strong>
          <span id="qSub">Elige la respuesta correcta.</span>
        </div>
      </div>

      <div id="answers" class="answers"></div>

      <div id="validBox" class="validBox">
        <h3>Respuestas válidas posibles</h3>
        <ul id="validList"></ul>
      </div>

      <div id="selfCheck" class="selfCheck">
        <button id="btnGood" class="okBtn">Lo dije bien</button>
        <button id="btnBad" class="badBtn">No lo dije bien</button>
      </div>

      <div class="feedbackWrap">
		  <div id="feedback" class="feedback"></div>

		  <div class="bottom">
			<button id="btnNext" class="primary hidden">Siguiente</button>
		  </div>
		</div>
    </section>

    <p class="note"></p>
  </main>

  <script>
    const TESTS = [
      { id:"cubos", n:1, name:"Construcción con Cubos", abbr:"CC", category:"Primaria (CIT)", cit:true },
      { id:"analogias", n:2, name:"Analogías", abbr:"AN", category:"Primaria (CIT)", cit:true },
      { id:"matrices", n:3, name:"Matrices de Razonamiento", abbr:"MR", category:"Primaria (CIT)", cit:true },
      { id:"digitos", n:4, name:"Retención de Dígitos", abbr:"RD", category:"Primaria (CIT)", cit:true },
      { id:"claves", n:5, name:"Claves", abbr:"CLA", category:"Primaria (CIT)", cit:true },
      { id:"vocabulario", n:6, name:"Vocabulario", abbr:"VOC", category:"Primaria (CIT)", cit:true },
      { id:"balanzas", n:7, name:"Balanzas", abbr:"BAL", category:"Primaria (CIT)", cit:true },

      { id:"rompecabezas", n:8, name:"Rompecabezas Visuales", abbr:"RV", category:"Primaria", cit:false },
      { id:"imagenes", n:9, name:"Retención de Imágenes", abbr:"RI", category:"Primaria", cit:false },
      { id:"busquedaSimbolos", n:10, name:"Búsqueda de Símbolos", abbr:"BS", category:"Primaria", cit:false },

      { id:"informacion", n:11, name:"Información", abbr:"INF", category:"Complementaria", cit:false },
      { id:"secuenciacion", n:12, name:"Secuenciación Letras — Números", abbr:"SLN", category:"Complementaria", cit:false },
      { id:"cancelacion", n:13, name:"Cancelación", abbr:"CAN", category:"Complementaria", cit:false },
      { id:"comprension", n:14, name:"Comprensión", abbr:"COM", category:"Complementaria", cit:false },
      { id:"aritmetica", n:15, name:"Aritmética", abbr:"ARI", category:"Complementaria", cit:false }
    ];

    const CATEGORIES = ["Primaria (CIT)", "Primaria", "Complementaria"];

    const QUESTIONS = {
      cubos:{
        task:true,
        timeLimit:45,
        faces:["W","R","TR","BL","TL","BR"],
		patterns:[

		  {
			name:"Diseño 1",
			img:"img/cub/cub_01.png",
			size:2,
			rotated:false,
			target:[
			  "W","W",
			  "R","W"
			]
		  },

		  {
			name:"Diseño 2",
			img:"img/cub/cub_02.png",
			size:2,
			rotated:false,
			target:[
			  "W","R",
			  "W","R"
			]
		  },

		  {

    function shuffleQuestion(q){
      if(!q || !Array.isArray(q.a)) return q;

      const arr = q.a.map((txt,i)=>({txt,correct:i===q.c}));
      for(let i=arr.length-1;i>0;i--){
        const j=Math.floor(Math.random()*(i+1));
        [arr[i],arr[j]]=[arr[j],arr[i]];
      }
      return {
        ...q,
        a: arr.map(x=>x.txt),
        c: arr.findIndex(x=>x.correct)
      };
    }

    function startCubosAuto(){

      const pattern = data.patterns[cubosIndex];

      cubosRunning = true;
      cubosCurrent = Array(size * size).fill("E");
      cubosSelectedFace = "W";

      $("feedback").textContent = "";

      clearInterval(cubosTimerInt);
      renderCubos();

      cubosTimerInt = setInterval(()=>{
        cubosSecondsLeft--;

        const t = $("cubeTime");
        if(t) t.textContent = cubosSecondsLeft + "s";

        if(cubosSecondsLeft <= 0){
          clearInterval(cubosTimerInt);
          cubosRunning = false;

          $("feedback").textContent = "Tiempo agotado";
          $("feedback").className = "feedback bad";

          $("btnNext").classList.remove("hidden");
          $("btnNext").textContent =
            cubosIndex < QUESTIONS.cubos.patterns.length - 1
              ? "Siguiente"
              : "Terminar";
        }
      },1000);

    function checkCubos(){
      if(!cubosRunning) return;

      const target = QUESTIONS.cubos.patterns[cubosIndex].target;
      const ok = cubosCurrent.length === target.length && cubosCurrent.every((face,i)=>face === target[i]);
		
      if(ok){
        clearInterval(cubosTimerInt);
        cubosRunning = false;
        document.body.classList.add("cubeFlashOk");
        setTimeout(()=>document.body.classList.remove("cubeFlashOk"), 160);

        $("feedback").textContent = "¡Correcto!";
        $("feedback").className = "feedback ok";
        $("btnNext").classList.remove("hidden");
        $("btnNext").textContent = cubosIndex < QUESTIONS.cubos.patterns.length - 1 ? "Siguiente" : "Terminar";
      } else {
        document.body.classList.add("cubeFlashBad");
        setTimeout(()=>document.body.classList.remove("cubeFlashBad"), 160);
        $("feedback").textContent = "No coincide";
        $("feedback").className = "feedback bad";
      }
    }

    function speakDigit(n){
      return new Promise(resolve=>{
        if(!("speechSynthesis" in window)){
          resolve();
          return;
        }

        const u = new SpeechSynthesisUtterance(String(n));
        u.lang = "es-ES";
        u.rate = 1.18;
        u.pitch = 1;
        u.onend = resolve;
        u.onerror = resolve;
        speechSynthesis.speak(u);
      });
    }

    function wait(ms){
      return new Promise(resolve=>setTimeout(resolve, ms));
    }

    async function playCurrentDigits(){
	  if(playingDigits) return;
	  const q = questions[qIndex];
	  if(!isDigitQuestion(q)) return;

	  playingDigits = true;
	  speechSynthesis.cancel();

	  $("digitStatus").textContent = "Escucha...";
	  $("btnPlayDigits").disabled = true;
	  $("answers").classList.add("locked");

	  const gap = 450;

	q.seq.forEach((n, i) => {

	  const u = new SpeechSynthesisUtterance(String(n));

	  u.lang = "es-ES";
	  u.rate = 1.15;
	  u.pitch = 1;

	  // último dígito
	  if(i === q.seq.length - 1){

		u.onend = () => {
		  $("digitStatus").textContent = "Ahora responde";
		  $("btnPlayDigits").disabled = false;
		  $("answers").classList.remove("locked");
		  playingDigits = false;
		};
	  }

	  setTimeout(() => {
		speechSynthesis.speak(u);
	  }, i * gap);

	});
	}

        <button class="keyBtn del" data-k="del">⌫</button>
        <button class="keyBtn" data-k="0">0</button>
        <button class="keyBtn ok" data-k="ok">OK</button>
      `;

      document.querySelectorAll(".keyBtn").forEach(btn=>{
        btn.onclick = ()=>{
          const k = btn.dataset.k;

          if($("answers").classList.contains("locked")) return;

          if(k === "del"){
            digitInput = digitInput.slice(0,-1);
          } else if(k === "ok"){
            checkDigitAnswer();
            return;
          } else if(digitInput.length < 12){
            digitInput += k;
          }

          $("digitInput").textContent = formatDigits(digitInput);
        };
      });
    }

    function checkDigitAnswer(){
      if(answered) return;

      answered = true;
      const q = questions[qIndex];
      const user = digitInput.split("").map(Number);
      const ok = user.length === q.answer.length && user.every((n,i)=>n === q.answer[i]);

      $("digitAnswer").textContent = "Respuesta correcta: " + q.answer.join("-");

      $("qSub").innerHTML = "&nbsp;";
      $("digitStatus").textContent = " ";

      if(ok){
        $("feedback").textContent = "¡Correcto!";
        $("feedback").className = "feedback ok";
      } else {
        $("feedback").textContent = "No es correcto";
        $("feedback").className = "feedback bad";
      }

      $("btnNext").classList.remove("hidden");
      $("btnNext").textContent = qIndex < questions.length - 1 ? "Siguiente" : "Terminar";
    }


    function tryMatrixFallback(img){
      if(img.dataset.triedFallback === "1") return;
      img.dataset.triedFallback = "1";

      const src = img.getAttribute("src");

      // Permite dos estilos de nombre:
      // mr_10.png, mr_11.png...
      // mr_010.png, mr_011.png...
      const m = src.match(/mr_(\d+)\.png$/);
      if(!m) return;

      const n = parseInt(m[1], 10);
      if(Number.isNaN(n)) return;

      const currentName = m[0];
      const altName = n >= 10
        ? `mr_0${n}.png`
        : `mr_${String(n).padStart(2,"0")}.png`;

      if(currentName !== altName){
        img.src = src.replace(currentName, altName);
      }
    }



    function isClavesTest(){
      return currentTest && currentTest.id === "claves";
    }

    function setupClaves(){

	  const data = QUESTIONS.claves;

	  questions = [data];

	  qIndex = 0;

	  clavesRunning = false;
	  clavesIndex = 0;
	  clavesCorrect = 0;
	  clavesWrong = 0;

	  clavesSecondsLeft = data.timeLimit || 120;

	  // ORDEN FIJO PARA TODA LA SESIÓN
	  clavesPadOrder = Object.keys(data.key)
		.sort(()=>Math.random()-0.5);

	  $("practiceTitle").textContent =
		`${currentTest.abbr} · ${currentTest.name}`;

	  $("digitMenu").classList.add("hidden");
	}

    function renderClaves(){
      const data = QUESTIONS.claves;
      const key = data.key;

      $("counter").innerHTML = `
        <div class="clavesHud">
          <div class="clavesTime" id="clavesTime">${clavesSecondsLeft}s</div>
          <div class="clavesStats">
            <div>Aciertos: <span id="clavesOk">${clavesCorrect}</span></div>
            <div>Errores: <span id="clavesBad">${clavesWrong}</span></div>
          </div>
        </div>
      `;

      const keyHtml = Object.keys(key).map(n => `
        <div class="clavesKeyItem">
          <b>${n}</b>
          <span>${key[n]}</span>
        </div>
      `).join("");

      $("qText").innerHTML = `
        <div class="clavesPanel">
          <div class="clavesKey">${keyHtml}</div>
          <div class="clavesPromptLabel">${clavesRunning ? "Elige el símbolo de:" : "Pulsa iniciar cuando estés listo"}</div>
          <div class="clavesNumber" id="clavesNumber">${clavesRunning ? data.sequence[clavesIndex] : "—"}</div>
          ${clavesRunning ? "" : `<button class="clavesStart" id="btnStartClaves">Iniciar 120s</button>`}
        </div>
      `;

      $("qSub").innerHTML = "&nbsp;";
      $("validBox").classList.remove("active");
      $("selfCheck").classList.remove("active");
      $("validList").innerHTML = "";
      $("feedback").textContent = "";
      $("feedback").className = "feedback";
      $("btnNext").classList.add("hidden");

      const timerEl = $("timer");
      if(timerEl) timerEl.style.display = "none";

      renderSymbolPad();

      if(!clavesRunning){
        $("answers").classList.add("locked");
        $("btnStartClaves").onclick = startClaves;
      } else {
        $("answers").classList.remove("locked");
      }
    }

	function renderSymbolPad(){

	  const key = QUESTIONS.claves.key;

	  $("answers").className = "symbolPad";

	  // usa el mismo orden toda la sesión
	  $("answers").innerHTML = clavesPadOrder.map(n => `
		<button class="symbolBtn" data-n="${n}">
		  ${key[n]}
		</button>
	  `).join("");

	  document.querySelectorAll(".symbolBtn").forEach(btn=>{

		btn.onclick = () =>
		  handleClavesAnswer(Number(btn.dataset.n));

	  });

	}

    function startClaves(){
      const data = QUESTIONS.claves;

      clavesRunning = true;
      clavesIndex = 0;
      clavesCorrect = 0;
      clavesWrong = 0;
      clavesSecondsLeft = data.timeLimit || 120;

      renderClaves();

      clearInterval(clavesTimerInt);
      clavesTimerInt = setInterval(()=>{
        clavesSecondsLeft--;

        const t = $("clavesTime");
        if(t) t.textContent = clavesSecondsLeft + "s";

        if(clavesSecondsLeft <= 0){
          finishClaves();
        }
      },1000);
    }

    function handleClavesAnswer(n){
      if(!clavesRunning) return;

      const data = QUESTIONS.claves;
      const expected = data.sequence[clavesIndex];

      if(n === expected){
        clavesCorrect++;
        document.body.classList.add("clavesFlashOk");
        setTimeout(()=>document.body.classList.remove("clavesFlashOk"), 90);
      } else {
        clavesWrong++;
        document.body.classList.add("clavesFlashBad");
        setTimeout(()=>document.body.classList.remove("clavesFlashBad"), 110);
      }

      clavesIndex++;

      if(clavesIndex >= data.sequence.length){
        finishClaves();
        return;
      }

      const num = $("clavesNumber");
      if(num) num.textContent = data.sequence[clavesIndex];

      const ok = $("clavesOk");
      const bad = $("clavesBad");
      if(ok) ok.textContent = clavesCorrect;
      if(bad) bad.textContent = clavesWrong;
    }

    function finishClaves(){
      clearInterval(clavesTimerInt);
      clavesRunning = false;

      const neto = Math.max(0, clavesCorrect - clavesWrong);

      $("counter").textContent = "Claves finalizado";
      $("qText").innerHTML = `
        <div class="clavesResult">
          <h3>Resultado</h3>
          <div class="clavesResultGrid">
            <div class="clavesResultBox"><b>${clavesCorrect}</b><span>Aciertos</span></div>
            <div class="clavesResultBox"><b>${clavesWrong}</b><span>Errores</span></div>
            <div class="clavesResultBox"><b>${neto}</b><span>Neto</span></div>
          </div>
        </div>
      `;
      $("qSub").innerHTML = "&nbsp;";
      $("answers").innerHTML = `<button class="primary" id="btnRestartClaves">Reiniciar Claves</button>`;
      $("answers").className = "answers";
      $("feedback").textContent = "";
      $("btnNext").classList.add("hidden");

      $("btnRestartClaves").onclick = () => {
        setupClaves();
        showQuestion();
      };
    }


    function getQuestionTime(){
      const currentQuestion = questions[qIndex];
      if(!currentQuestion || !currentQuestion.qImg) return null;

      const n = qIndex + 1;

      // Matrices y Balanzas:
      // ítems 1-18 => 20s
      // ítems 19-34 => 30s
      return n <= 18 ? 20 : 30;
    }

    function startTimer(){
      clearInterval(timerInt);

      const timerEl = $("timer");
      if(!timerEl) return;

      const limit = getQuestionTime();

      if(limit === null){
        timerEl.style.display = "none";
        return;
      }

      timerEl.style.display = "flex";
      secondsLeft = limit;
      timerEl.textContent = secondsLeft;
      timerEl.className = "timer";

      timerInt = setInterval(()=>{
        secondsLeft--;

        timerEl.textContent = secondsLeft;

        if(secondsLeft <= 5){
          timerEl.className = "timer warn";
        }

        if(secondsLeft <= 0){
          clearInterval(timerInt);

          const currentQuestion = questions[qIndex];

          document.querySelectorAll(".answer").forEach((b,idx)=>{
            if(idx === currentQuestion.c){
              b.classList.add("correct");
            }
          });

          $("feedback").textContent = "Tiempo agotado";
          $("feedback").className = "feedback bad";

          $("btnNext").classList.remove("hidden");
          $("btnNext").textContent =
            qIndex < questions.length - 1 ? "Siguiente" : "Terminar";

          answered = true;
        }
      },1000);
    }


    function showQuestion(){
      const currentQuestion = questions[qIndex];
      answered = false;
      digitInput = "";

      if(isCubosTest()){
        if(!cubosRunning){
          startCubosAuto();
        } else {
          renderCubos();
        }
        return;
      }

      if(isClavesTest()){
        renderClaves();
        return;
      }

      if(isDigitQuestion(currentQuestion)){
        const mode = (QUESTIONS.digitos && QUESTIONS.digitos[digitModeIndex]) ? QUESTIONS.digitos[digitModeIndex] : {modeName:'Retención de Dígitos'};

        $("counter").textContent = `${mode.modeName} · Ítem ${currentQuestion.item} · Intento ${currentQuestion.intento}`;
        $("qText").innerHTML = `
          <div class="digitPanel">
            <div class="digitListen" id="digitStatus">Pulsa reproducir</div>
            <button class="playBtn" id="btnPlayDigits">▶ Reproducir</button>
            <div class="digitInput" id="digitInput">—</div>
            <div class="digitAnswer" id="digitAnswer"></div>
          </div>
        `;
        $("qSub").innerHTML = "&nbsp;";

        $("validBox").classList.remove("active");
        $("selfCheck").classList.remove("active");
        $("validList").innerHTML = "";
        $("feedback").textContent = "";
        $("feedback").className = "feedback";
        $("btnNext").classList.add("hidden");

        const timerEl = $("timer");
        if(timerEl) timerEl.style.display = "none";

        renderDigitKeypad();
        $("answers").classList.add("locked");
        $("btnPlayDigits").onclick = playCurrentDigits;
        return;
      }

      if(!currentQuestion){
        $("counter").textContent = "Sin contenido";
        $("qText").textContent = "No hay preguntas cargadas para esta prueba.";
        $("qSub").innerHTML = "&nbsp;";
        $("answers").innerHTML = "";
        $("answers").className = "answers";
        $("validBox").classList.remove("active");
        $("selfCheck").classList.remove("active");
        $("feedback").textContent = "";
        $("btnNext").classList.add("hidden");
        const timerEl = $("timer");
        if(timerEl) timerEl.style.display = "none";
        return;
      }

      $("counter").textContent = `Pregunta ${qIndex + 1}/${questions.length}`;

      if(currentQuestion.qImg){
        $("qText").innerHTML = `<img class="matrixImg" src="${currentQuestion.qImg}" alt="Matriz ${currentQuestion.item || (qIndex + 1)}" onerror="tryMatrixFallback(this)">`;
        $("qSub").textContent = `Elige la respuesta correcta: 1, 2, 3, 4 o 5`;
      } else {
        $("qText").textContent = currentQuestion.q;
        $("qSub").textContent = currentQuestion.sub;
      }

      $("feedback").textContent = "";
      $("feedback").className = "feedback";
      startTimer();
      $("btnNext").classList.add("hidden");

      $("validBox").classList.remove("active");
      $("selfCheck").classList.remove("active");
      $("validList").innerHTML = "";

      if(currentQuestion.oral){
        $("answers").className = "answers";
        $("answers").innerHTML = `<button class="primary" id="btnShowValid">Mostrar respuestas posibles</button>`;
        $("btnShowValid").onclick = showValidAnswers;
      } else {
        const opts = currentQuestion.qImg ? ["1","2","3","4","5"] : currentQuestion.a;
        $("answers").className = currentQuestion.qImg ? "matrixAnswers" : "answers";
        $("answers").innerHTML = opts.map((txt,i) => `
          <button class="answer" data-i="${i}">${txt}</button>
        `).join("");

        document.querySelectorAll(".answer").forEach(btn => {
          btn.onclick = () => answer(Number(btn.dataset.i));
        });
      }
    }


    function showValidAnswers(){
      if(!questions[qIndex]) return;
      const currentQuestion = questions[qIndex];
      $("validList").innerHTML = (currentQuestion.valid || []).map(x => `<li>${x}</li>`).join("");
      $("validBox").classList.add("active");
      $("selfCheck").classList.add("active");
      $("btnNext").classList.add("hidden");
    }

    function selfMark(ok){
      $("feedback").textContent = ok ? "¡Muy bien!" : "Sigue practicando";
      $("feedback").className = ok ? "feedback ok" : "feedback bad";
      $("btnNext").classList.remove("hidden");
      $("btnNext").textContent = qIndex < questions.length - 1 ? "Siguiente" : "Terminar";
    }

    function answer(i){
      if(answered) return;

      clearInterval(timerInt);
      answered = true;
      const currentQuestion = questions[qIndex];

      document.querySelectorAll(".answer").forEach(btn => {
        const idx = Number(btn.dataset.i);
        if(idx === currentQuestion.c) btn.classList.add("correct");
        else if(idx === i) btn.classList.add("wrong");
      });

      if(i === currentQuestion.c){
        $("feedback").textContent = "¡Correcto!";
        $("feedback").className = "feedback ok";
      } else {
        $("feedback").textContent = "No es correcto";
        $("feedback").className = "feedback bad";
      }

      $("btnNext").classList.remove("hidden");
      $("btnNext").textContent = qIndex < questions.length - 1 ? "Siguiente" : "Terminar";
    }

    $("btnCit").onclick = () => { mode = "cit"; render(); };
    $("btnAll").onclick = () => { mode = "all"; render(); };

    $("btnClose").onclick = () => {
      clearInterval(timerInt);
      clearInterval(clavesTimerInt);
      clearInterval(cubosTimerInt);
      if("speechSynthesis" in window) speechSynthesis.cancel();
      cubosRunning = false;
      clavesRunning = false;
      playingDigits = false;
      $("practice").classList.remove("active");
      document.body.classList.remove("practiceMode");
    };

    $("btnGood").onclick = () => selfMark(true);
    $("btnBad").onclick = () => selfMark(false);

    $("btnNext").onclick = () => {
      clearInterval(timerInt);
      clearInterval(clavesTimerInt);
      clearInterval(cubosTimerInt);
      if("speechSynthesis" in window) speechSynthesis.cancel();
      playingDigits = false;

      if(isCubosTest()){
        if(cubosIndex < QUESTIONS.cubos.patterns.length - 1){
          cubosIndex++;
          cubosRunning = false;
          const pattern = QUESTIONS.cubos.patterns[cubosIndex];
          const size = pattern.size || 2;
          cubosCurrent = Array(size * size).fill("E");
          cubosSelectedFace = "W";
		  cubosSecondsLeft = QUESTIONS.cubos.timeLimit || 45;
          $("feedback").textContent = "";
          $("feedback").className = "feedback";
          showQuestion();
        } else {
          cubosRunning = false;
          $("practice").classList.remove("active");
          document.body.classList.remove("practiceMode");
        }
        return;
      }

      if(qIndex < questions.length - 1){
        qIndex++;
        showQuestion();
      } else {
        $("practice").classList.remove("active");
        document.body.classList.remove("practiceMode");
      }
    };

    render();

  </script>
</body>
</html>
